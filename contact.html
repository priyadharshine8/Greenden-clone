<body class="bg-white">
    <nav class="flex justify-between items-center px-6 py-6 border-b">
        <h1 class="text-3xl font-black text-green-800">Greenden</h1>
        <ul class="flex gap-8 font-bold text-sm">
            <li><a href="index.html" class="hover:text-green-600">Home</a></li>
            <li><a href="products.html" class="hover:text-green-600">Products</a></li>
            <li><a href="contact.html" class="text-green-700 underline">Contact</a></li>
        </ul>
    </nav>

    <section class="py-16 container mx-auto px-6">
        <h2 class="text-4xl font-black text-center mb-12 italic">Customer Reviews</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
            <div class="bg-green-50 p-8 rounded-3xl">
                <p class="text-gray-600 italic mb-4">"Best quality artificial flowers ever!"</p>
                <h4 class="font-bold text-green-800">— Priya</h4>

                <p class="text-gray-600 italic mb-4">"Fast shipping and great support."</p>
                <h4 class="font-bold text-green-800">— Sowfia</h4>
            </div>
            <div class="bg-green-50 p-8 rounded-3xl">

                <h4 class="font-bold text-green-800">— Virat</h4>
            </div>
        </div>
    </section>

    <section class="bg-green-900 py-16 text-white text-center">
        <h2 class="text-3xl font-bold mb-4">Join our Newsletter</h2>
        <p class="mb-8 opacity-80">Signup for exclusive discounts and updates</p>
        <div class="max-w-md mx-auto flex px-6">
            <input type="email" placeholder="Your Email" class="flex-1 p-4 rounded-l-lg text-black outline-none">
            <button class="bg-green-600 px-6 py-4 rounded-r-lg font-bold hover:bg-green-500 transition">Subscribe</button>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-400 border-t mt-10">
