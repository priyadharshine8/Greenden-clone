<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenden | Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-white">
    <nav class="flex justify-between items-center px-6 py-6 border-b">
        <h1 class="text-3xl font-black text-green-800">Greenden</h1>
        <ul class="flex gap-8 font-bold text-sm">
            <li><a href="index.html" class="hover:text-green-600">Home</a></li>
            <li><a href="products.html" class="text-green-600 underline">Products</a></li>
            <li><a href="contact.html" class="hover:text-green-600">Contact</a></li>
        </ul>
    </nav>

    <main class="container mx-auto px-6 py-12">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-black italic mb-6">Our Best Sellers</h2>
            <input type="text" id="searchInput" placeholder="Search for a plant..." class="border-2 border-gray-200 p-3 rounded-full w-full max-w-md outline-none focus:border-green-600">
        </div>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="product-card bg-white p-4 border rounded-3xl hover:shadow-xl transition">
                <img src="https://images.unsplash.com/photo-1560717789-0ac7c58ac90a?auto=format&fit=crop&w=500&q=80" class="rounded-2xl h-60 w-full object-cover">
                <h4 class="text-xl font-bold mt-4">Rose</h4>
                <p class="text-green-700 font-bold">$20</p>
                <button class="mt-3 w-full bg-green-700 text-white py-2 rounded-lg hover:bg-black transition">Add to Cart</button>
            </div>
            <div class="product-card bg-white p-4 border rounded-3xl hover:shadow-xl transition">
                <img src="https://dukaan.b-cdn.net/700x700/webp/media/3044c893-d4e7-428d-8bdd-5cd17f3b8b93.png" class="rounded-2xl h-60 w-full object-cover">
                <h4 class="text-xl font-bold mt-4">Marigold</h4>
                <p class="text-green-700 font-bold">$20</p>
                <button class="mt-3 w-full bg-green-700 text-white py-2 rounded-lg hover:bg-black transition">Add to Cart</button>
            </div>
            <div class="product-card bg-white p-4 border rounded-3xl hover:shadow-xl transition">
                <img src="https://images.unsplash.com/photo-1494516192674-b82b5f1e61dc?auto=format&fit=crop&w=500&q=80" class="rounded-2xl h-60 w-full object-cover">
                <h4 class="text-xl font-bold mt-4">Waterbury</h4>
                <p class="text-green-700 font-bold">$20</p>
                <button class="mt-3 w-full bg-green-700 text-white py-2 rounded-lg hover:bg-black transition">Add to Cart</button>
            </div>
            <div class="product-card bg-white p-4 border rounded-3xl hover:shadow-xl transition">
                <img src="https://oleander.ca/cdn/shop/articles/cyclamen.JPG?v=1569424027" class="rounded-2xl h-60 w-full object-cover">
                <h4 class="text-xl font-bold mt-4">Cyclamen</h4>
                <p class="text-green-700 font-bold">$20</p>
                <button class="mt-3 w-full bg-green-700 text-white py-2 rounded-lg hover:bg-black transition">Add to Cart</button>
            </div>
        </div>
    </main>

    <script>
        // Simple search logic
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            let term = e.target.value.toLowerCase();
            let cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                let name = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = name.includes(term) ? "block" : "none";
            });
        });
    </script>
</body>
</html>
